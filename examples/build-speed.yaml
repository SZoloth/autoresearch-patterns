name: optimize-build-speed
description: Reduce production build time

metric:
  name: build_seconds
  unit: seconds
  direction: lower
  extract: duration

eval: pnpm build 2>&1

mutable:
  - vite.config.ts
  - tsconfig.json
  - src/

immutable:
  - src/**/*.test.ts
  - package.json

constraints:
  - Build must succeed without errors
  - Output must be functionally identical
  - No new dependencies

timeout: 300
