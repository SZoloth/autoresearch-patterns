name: reduce-bundle-size
description: Minimize production JavaScript bundle size

metric:
  name: bundle_kb
  unit: KB
  direction: lower
  extract: file-size dist/

eval: pnpm build 2>&1

mutable:
  - src/
  - vite.config.ts

immutable:
  - src/**/*.test.ts
  - package.json

constraints:
  - App must build without errors
  - All features must still work (no removing functionality)
  - No new dependencies

timeout: 120
